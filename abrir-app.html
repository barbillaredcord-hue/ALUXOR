<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abrir ALUXOR</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17201b;
        background: #eef1ed;
      }

      main {
        width: min(560px, 100%);
        padding: 24px;
        background: #fffdf8;
        border: 1px solid #d8d2c7;
        border-radius: 8px;
        box-shadow: 0 14px 36px rgba(35, 43, 38, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 18px;
        color: #526159;
        line-height: 1.5;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 10px;
        color: white;
        background: #22745f;
        border-radius: 7px;
        font-weight: 800;
        text-decoration: none;
      }

      a.secondary {
        color: #26362d;
        background: #edf5f1;
        border: 1px solid #bdd8ce;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Abrir ALUXOR</h1>
      <p>Si abriste el archivo principal con doble clic y se ve blanco, usa una de estas opciones.</p>
      <a href="http://127.0.0.1:5173/">Abrir con servidor local</a>
      <a class="secondary" href="./dist/index.html">Abrir version compilada</a>
    </main>
  </body>
</html>
